<svg viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6AC1"/>
      <stop offset="50%" stop-color="#FF3D3D"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <filter id="bladeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="100" rx="14" fill="#0d0d16"/>

  <path id="teethPath" d="M0,72 L30,30 L60,72 L90,30 L120,72 L150,30 L180,72 L210,30 L240,72 L270,30 L300,72 L330,30 L360,72 L390,30 L420,72 L450,30 L480,72 L510,30 L540,72 L570,30 L600,72 L630,30 L660,72 L690,30 L720,72 L750,30 L780,72 L810,30 L840,72 L870,30 L900,72 L930,30 L960,72 L990,30 L1020,72 L1050,30 L1080,72 L1110,30 L1140,72 L1170,30 L1200,72"
        fill="none" stroke="url(#bladeGrad)" stroke-width="4" stroke-linejoin="round" filter="url(#bladeGlow)">
    <animate attributeName="stroke-width" values="4;7;4" dur="1.6s" repeatCount="indefinite"/>
  </path>

  <circle r="5" fill="#ffffff" filter="url(#bladeGlow)">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#teethPath"/>
    </animateMotion>
  </circle>
  <circle r="4" fill="#FF6AC1" filter="url(#bladeGlow)">
    <animateMotion dur="3s" begin="1s" repeatCount="indefinite">
      <mpath href="#teethPath"/>
    </animateMotion>
  </circle>
  <circle r="4" fill="#00F5FF" filter="url(#bladeGlow)">
    <animateMotion dur="3s" begin="2s" repeatCount="indefinite">
      <mpath href="#teethPath"/>
    </animateMotion>
  </circle>
</svg>